<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pickup Up{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

      <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

     <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f5f3ef; }
 
    nav {
      box-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 4px 24px rgba(0,0,0,0.05);
      animation: slideDown 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
 
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .search-wrap {
      transition: box-shadow 0.2s;
    }
    .search-wrap:focus-within {
      box-shadow: 0 0 0 2.5px #e8432d55;
    }
 
    .search-wrap input {
      outline: none;
      background: transparent;
    }
 
    .search-wrap input::placeholder {
      color: #bbb;
    }
 
    .avatar {
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 0 2px #fff, 0 0 0 3.5px #e4e0db;
    }
    .avatar:hover {
      transform: scale(1.06);
      box-shadow: 0 0 0 2px #fff, 0 0 0 3.5px #e8432d;
    }
 
    .logo-mark {
      background: #fff;
    }
  </style>
     
</head>
<body class="grain min-h-screen bg-[#f5f3ef] flex items-center justify-center px-4 w-full">
   <nav class="bg-white fixed top-0 left-0 right-0 w-full z-50 flex">
 
    <!-- Logo -->
    <div class="flex items-center gap-2.5 flex-shrink-0">
      <div class="logo-mark w-64 h-38 rounded-lg flex items-center justify-center">
        <img src="{{ url_for('static', path='logo-nav.png') }}" alt="Logo">
      </div>
    </div>
 
    <!-- Search bar — centered -->
    <div class="flex-1 flex justify-center">
      <div class="search-wrap flex items-center gap-2.5 bg-[#faf9f7] border border-[#e4e0db] rounded-xl px-4 py-2.5 w-full max-w-md">
        <svg class="flex-shrink-0 text-[#bbb]" width="15" height="15" viewBox="0 0 20 20" fill="none">
          <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M14 14L18 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          placeholder="Search…"
          class="w-full text-sm text-[#1a1a1a] font-light"
        />
        <kbd class="hidden sm:flex items-center gap-0.5 text-[10px] text-[#ccc] font-medium border border-[#e8e4e0] rounded-md px-1.5 py-0.5 flex-shrink-0">⌘K</kbd>
      </div>
    </div>
 
    <!-- Right: profile avatar -->
    <div class="flex items-center gap-3 flex-shrink-0">

 
      <!-- Avatar -->
      <button class="avatar w-8 h-8 rounded-full overflow-hidden flex-shrink-0 cursor-pointer">
        <img
          src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=ffd5cc"
          alt="Profile"
          class="w-full h-full object-cover"
        />
      </button>
    </div>
 
  </nav>

    {% block content %}{% endblock %}
</body>
</html>
