<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pickup Up{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

      <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

     <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1, .serif { font-family: 'Instrument serif', serif; }
 
    .card-shadow {
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.08);
    }
 
    input:focus {
      outline: none;
      border-color: #1a1a1a;
    }
 
    .btn-primary {
      background: #006341;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover {
      background: #006353;
      transform: translateY(-1px);
    }
    .btn-primary:active {
      transform: translateY(0px);
    }
 
    .fade-up {
      animation: fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .fade-up:nth-child(1) { animation-delay: 0.05s; }
    .fade-up:nth-child(2) { animation-delay: 0.12s; }
    .fade-up:nth-child(3) { animation-delay: 0.19s; }
    .fade-up:nth-child(4) { animation-delay: 0.26s; }
    .fade-up:nth-child(5) { animation-delay: 0.33s; }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="grain min-h-screen bg-[#f5f3ef] flex items-center justify-center px-4">
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-32 -left-32 w-[500px] h-[500px] rounded-full bg-[#e8e2d9] blur-[100px] opacity-60"></div>
    <div class="absolute -bottom-32 -right-32 w-[400px] h-[400px] rounded-full bg-[#ddd8cf] blur-[100px] opacity-50"></div>
  </div>
    {% block content %}{% endblock %}
</body>
</html>
