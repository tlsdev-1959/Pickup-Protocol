<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pickup Up{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

      <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

     <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

     <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f5f3ef; }
 
    nav {
      box-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 4px 24px rgba(0,0,0,0.05);
      animation: slideDown 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
 
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .search-wrap {
      transition: box-shadow 0.2s;
    }
    .search-wrap:focus-within {
      box-shadow: 0 0 0 2.5px #8cbf8c;
    }
 
    .search-wrap input {
      outline: none;
      background: transparent;
    }
 
    .search-wrap input::placeholder {
      color: #bbb;
    }
 
    .avatar {
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 0 2px #fff, 0 0 0 3.5px #e4e0db;
    }
    .avatar:hover {
      transform: scale(1.06);
      box-shadow: 0 0 0 2px #fff, 0 0 0 3.5px #006341;
    }
 
    .logo-mark {
      background: #fff;
    }
  </style>

  <script>
    async function loadProfilePicture() {
      const response = await fetch("{{url_for('my_picture')}}")
      const data = await response.json()
      document.querySelectorAll('img#profile_url').forEach(img => img.src = data.url)
    }

    loadProfilePicture()
  </script>
     
</head>
<body class="grain min-h-screen bg-[#f5f3ef] flex items-center justify-center px-4 w-full">
   <nav class="bg-white fixed h-16 top-0 left-0 right-0 w-full z-50 flex items-center">

    <!-- Logo -->
    <div class="flex items-center gap-2.5 flex-shrink-0 pl-4">
      <div class="logo-mark w-64 h-38 rounded-lg flex items-center justify-center">
        <img src="{{ url_for('static', path='logo-nav.png') }}" alt="Logo">
      </div>
    </div>

    <!-- Search bar — absolutely centered -->
    <div class="absolute left-1/2 -translate-x-1/2 w-full max-w-md px-4"
         x-data="{
           query: '',
           suggestions: [],
           timer: null,
           onInput() {
             clearTimeout(this.timer)
             if (!this.query.trim()) { this.suggestions = []; return }
             this.timer = setTimeout(() => this.fetchSuggestions(), 200)
           },
           async fetchSuggestions() {
             const res = await fetch(`/api/search/byname?name=${encodeURIComponent(this.query)}`)
             this.suggestions = await res.json()
           }
         }"
         @click.outside="suggestions = [Tanner, Tim, Xander]">
      <div class="search-wrap flex items-center gap-2.5 bg-[#faf9f7] border border-[#e4e0db] rounded-xl px-4 py-2.5 w-full">
        <svg class="flex-shrink-0 text-[#bbb]" width="15" height="15" viewBox="0 0 20 20" fill="none">
          <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M14 14L18 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          placeholder="Search…"
          class="w-full text-sm text-[#1a1a1a] font-light"
          x-model="query"
          @input="onInput()"
          @keydown.escape="suggestions = []; query = ''"
        />
        <kbd class="hidden sm:flex items-center gap-0.5 text-[10px] text-[#ccc] font-medium border border-[#e8e4e0] rounded-md px-1.5 py-0.5 flex-shrink-0">⌘K</kbd>
      </div>

      <!-- Suggestions dropdown -->
      <div x-show="suggestions.length > 0"
           class="mt-1 bg-white border border-[#e4e0db] rounded-xl shadow-lg overflow-hidden">
        <template x-for="(item, index) in suggestions" :key="index">
          <div class="px-4 py-2.5 text-sm text-[#1a1a1a] hover:bg-[#faf9f7] cursor-pointer" x-text="item.name">Tanner</div>
        </template>
      </div>
    </div>

    <!-- Spacer to push avatar to the right -->
    <div class="flex-1"></div>

    <!-- Right: profile avatar -->
    <div class="flex items-center gap-1 flex-shrink-0 pr-6">

 
      <!-- Avatar -->
      <button class="avatar w-11 h-11 rounded-full overflow-hidden flex-shrink-0 cursor-pointer relative">
        <div id="avatar-skeleton" class="absolute inset-0 bg-gray-200 animate-pulse rounded-full"></div>
        <img id="profile_url" alt="Profile" class="w-full h-full object-cover opacity-0 transition-opacity duration-300" onload="this.classList.replace('opacity-0','opacity-100'); document.getElementById('avatar-skeleton').style.display='none'">
      </button>
    </div>
 
  </nav>


    {% block content %}{% endblock %}
</body>
</html>
