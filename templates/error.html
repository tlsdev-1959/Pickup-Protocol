{% extends "base_public.html" %}

{% block title %}Pickup App - Error {{errorCode}}{% endblock %}

{% block content %}
    <div class="card-shadow bg-white rounded-2xl px-8 py-9">
        <div class="fade-up mb-7">
        <div class="justify-center">
          <img src="{{ url_for('static', path='logo.png') }}" alt="Logo" width="100" height="100">
        </div>
        <h1 class="text-[1.65rem] leading-tight text-[#1a1a1a] mb-1"><strong>Error {{errorCode}}:</strong> {{errorMsg}}</h1>
        <p class="text-sm text-[#888] font-light">Please email helpdesk if you believe you need access to this app</p>
      </div>
    </div>
{% endblock %}
