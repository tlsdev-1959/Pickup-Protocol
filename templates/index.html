{% extends "base_public.html" %}

{% block title %}Pickup App - Login{% endblock %}

{% block content %}



    <!-- Logo mark -->
    <div class="fade-up flex justify-center mb-8">
<!-- Card -->
 
    <div class="card-shadow bg-white rounded-2xl px-8 py-9">
      
      <section class="fade-up mb-7 flex justify-center items-center">
        <img src="{{ url_for('static', path='logo.png') }}" alt="Logo" width="100" height="100">
      </section>

      <div class="fade-up mb-7">
        <h1 class="text-[1.65rem] leading-tight text-[#1a1a1a] mb-1">The Lexington School Pickup Application</h1>
        <p class="text-sm text-[#888] font-light">Sign in to check students in or out</p>
      </div>
 
      <div class="space-y-4">

        <div class="fade-up pt-1">
          <a href="{{ url_for('auth') }}">
          <button class="btn-primary w-full text-white rounded-xl py-3 text-sm font-medium tracking-wide">
            Log in with TLS
          </button>
          </a>
        </div>
 
      </div>
 
    </div>
      </div>   
    </div>



{% endblock %}
